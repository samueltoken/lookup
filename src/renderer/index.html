<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lookup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-toolbar">
        <div class="toolbar-group toolbar-main-left">
          <button id="openFileBtn" class="action primary" data-i18n="open">열기</button>
          <button id="saveAsBtn" class="action" data-i18n="saveAs">다른 이름 저장</button>
          <button id="saveOverwriteBtn" class="action" data-i18n="saveOverwrite">덮어쓰기</button>
          <button id="printBtn" class="action icon-button" aria-label="인쇄" title="인쇄 (Ctrl+P)">
            <span class="button-icon" aria-hidden="true">🖨</span>
          </button>
        </div>

        <div class="toolbar-group">
          <button id="prevPageBtn" class="action" data-i18n="prev">이전</button>
          <input id="pageInput" class="page-input" type="number" min="1" value="1" />
          <span id="pageCountLabel" class="muted">/ 0</span>
          <button id="nextPageBtn" class="action" data-i18n="next">다음</button>
        </div>

        <div class="toolbar-group">
          <button id="zoomOutBtn" class="action">-</button>
          <span id="zoomLabel" class="muted">100%</span>
          <button id="zoomInBtn" class="action">+</button>
          <button id="zoomResetBtn" class="action" data-i18n="zoomReset">원래 크기</button>
        </div>

        <div class="toolbar-group">
          <button id="rotateLeftBtn" class="action" data-i18n="rotateLeft">왼쪽 회전</button>
          <button id="rotateRightBtn" class="action" data-i18n="rotateRight">오른쪽 회전</button>
          <button id="deletePageBtn" class="action danger" data-i18n="deletePage">페이지 삭제</button>
        </div>

        <div class="toolbar-group">
          <button id="editViewBtn" class="action mode active" data-mode="view" data-i18n="modeView">보기</button>
          <button id="editHighlightBtn" class="action mode" data-mode="highlight" data-i18n="modeHighlight">형광펜</button>
          <button id="editPenBtn" class="action mode" data-mode="pen" data-i18n="modePen">펜</button>
          <button id="editTextBtn" class="action mode" data-mode="text" data-i18n="modeText">텍스트 메모</button>
          <button id="undoBtn" class="action icon-button" aria-label="되돌리기" title="되돌리기 (Ctrl+Z)">
            <span class="button-icon" aria-hidden="true">↶</span>
          </button>
          <button id="redoBtn" class="action icon-button" aria-label="다시하기" title="다시하기 (Ctrl+Y)">
            <span class="button-icon" aria-hidden="true">↷</span>
          </button>
        </div>

        <div class="toolbar-group">
          <button id="toggleThumbPanelBtn" class="action" data-i18n="thumbToggleShow">미리보기 표시</button>
          <button id="toggleSearchPanelBtn" class="action" data-i18n="searchPanelToggleShow">검색 패널 표시</button>
          <button id="toggleFullscreenBtn" class="action" data-i18n="fullscreen">전체화면</button>
          <button id="toggleDarkBtn" class="action" data-i18n="darkMode">다크모드</button>
        </div>

        <div class="toolbar-group search-group">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            data-i18n-placeholder="searchPlaceholder"
            placeholder="문서 검색"
          />
          <button id="searchBtn" class="action" data-i18n="search">검색</button>
          <button id="searchPrevBtn" class="action" data-i18n="prevHit">이전 결과</button>
          <button id="searchNextBtn" class="action" data-i18n="nextHit">다음 결과</button>
          <span id="searchCountLabel" class="muted">결과 0개</span>
        </div>
      </header>

      <section id="updateBanner" class="update-banner hidden" role="status" aria-live="polite" aria-atomic="true">
        <div class="update-banner-head">
          <span id="updateStageText" class="update-stage-text">업데이트 대기</span>
          <span id="updateBannerPercentText" class="update-stage-percent">0%</span>
        </div>
        <div class="update-banner-track">
          <div id="updateBannerBar" class="update-banner-bar"></div>
        </div>
      </section>

      <main id="workspace" class="workspace">
        <aside id="thumbPanel" class="thumb-panel">
          <div class="panel-title" data-i18n="thumbPanelTitle">미리보기 (드래그로 순서 변경)</div>
          <div id="thumbnailList" class="thumb-list"></div>
        </aside>

        <div id="leftResizer" class="panel-resizer left" role="separator" aria-label="미리보기 패널 크기 조절"></div>

        <section id="viewerPanel" class="viewer-panel" tabindex="0">
          <div id="emptyHint" class="empty-hint">
            <h1>lookup</h1>
            <p data-i18n="dropHint">문서를 끌어놓거나 열기 버튼을 눌러 주세요.</p>
          </div>
          <div id="pagesContainer" class="pages-container"></div>
          <div id="textMemoEditor" class="text-memo-editor hidden">
            <input
              id="textMemoInput"
              class="text-memo-input"
              type="text"
              data-i18n-placeholder="textMemoHint"
              placeholder="메모 입력"
            />
            <div class="text-memo-actions">
              <button id="textMemoAddBtn" class="action primary" data-i18n="textMemoAdd">추가</button>
              <button id="textMemoCancelBtn" class="action" data-i18n="textMemoCancel">취소</button>
            </div>
          </div>

          <div id="fullscreenMiniBar" class="fullscreen-mini hidden">
            <button id="toggleFullscreenViewModeBtn" class="action" data-i18n="fullscreenModeContinuous">
              전체화면: 연속 스크롤
            </button>
            <button id="toggleThumbInFullscreenBtn" class="action" data-i18n="thumbToggleShow">미리보기 표시</button>
          </div>
        </section>

        <div id="rightResizer" class="panel-resizer right" role="separator" aria-label="검색 패널 크기 조절"></div>

        <aside id="searchPanel" class="search-panel">
          <div class="panel-title">
            <span data-i18n="searchResults">검색 결과</span>
            <span id="searchPanelCount" class="muted">0</span>
          </div>
          <ul id="searchResultList" class="search-result-list"></ul>
        </aside>
      </main>

      <footer id="statusBar" class="status-bar">
        <div class="status-main">
          <span id="statusText">준비 완료</span>
          <span id="currentVersionLabel" class="muted">현재 버전 -</span>
          <span id="targetVersionLabel" class="muted hidden">대상 버전 -</span>
        </div>
        <div id="updateProgressWrap" class="update-progress hidden">
          <div class="update-progress-track">
            <div id="updateProgressBar" class="update-progress-bar"></div>
          </div>
          <span id="updateProgressText" class="update-progress-text">0%</span>
        </div>
      </footer>
    </div>

    <div id="updateNotesModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="updateNotesTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="updateNotesTitle" data-i18n="updateNotesTitle">업데이트 완료</h2>
          <span id="updateNotesVersion" class="muted"></span>
        </div>
        <ul id="updateNotesList" class="modal-list"></ul>
        <div class="modal-actions">
          <button id="updateNotesCloseBtn" class="action primary" data-i18n="updateNotesClose">확인</button>
        </div>
      </div>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
